<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    header {
      padding: 100px 20px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2em;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: #2a5298;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ddd;
    }

    section {
      padding: 60px 20px;
      background: white;
      color: #333;
    }

    .card {
      background: #f4f4f4;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    footer {
      padding: 20px;
      font-size: 0.9em;
      background: #111;
    }
  </style>
</head>

<body>

<header>
  <h1>Bienvenue sur mon site</h1>
  <p>Je suis en train de créer quelque chose de stylé</p>
  <a href="#projets" class="btn">Voir mes projets</a>
</header>

<section id="projets">
  <h2>Mes projets</h2>

  <div class="card">
    <h3>Projet 1</h3>
    <p>Un truc incroyable que j’ai fait.</p>
  </div>

  <div class="card">
    <h3>Projet 2</h3>
    <p>Une idée géniale en cours.</p>
  </div>

</section>

<footer>
  <p>© 2026 - Mon site perso</p>
</footer>

</body>
</html>
